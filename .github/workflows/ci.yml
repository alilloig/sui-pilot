name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: mcp/move-lsp-mcp/package.json

      - name: Install dependencies
        working-directory: mcp/move-lsp-mcp
        run: pnpm install

      - name: Build MCP server
        working-directory: mcp/move-lsp-mcp
        run: pnpm build

      - name: Verify committed bundle matches source
        run: |
          if ! git diff --exit-code mcp/move-lsp-mcp/dist/; then
            echo ""
            echo "::error::dist/ is out of sync with src/. Run 'pnpm --dir mcp/move-lsp-mcp build' and recommit."
            exit 1
          fi

      - name: Enforce MCP bundle size budget
        run: |
          BUDGET=600000
          SIZE=$(wc -c < mcp/move-lsp-mcp/dist/index.js)
          echo "Bundle size: ${SIZE} bytes (budget: ${BUDGET})"
          if [ "$SIZE" -gt "$BUDGET" ]; then
            echo "::error::MCP bundle exceeds ${BUDGET} bytes (current: ${SIZE}). Investigate dependency growth before raising the budget."
            exit 1
          fi

      - name: Run unit tests
        working-directory: mcp/move-lsp-mcp
        run: set -o pipefail; pnpm test -- --reporter=verbose 2>&1 | grep -E '(✓|✗|PASS|FAIL|test/unit)'

      - name: Verify plugin structure
        run: |
          echo "Checking plugin structure..."
          test -f .claude-plugin/plugin.json && echo "✓ plugin.json exists"
          test -f .claude-plugin/marketplace.json && echo "✓ marketplace.json exists"
          test -f agents/sui-pilot-agent.md && echo "✓ agent exists"
          test -d skills && echo "✓ skills directory exists"
          test -f mcp/move-lsp-mcp/dist/index.js && echo "✓ MCP server built"
          test -f LICENSE && echo "✓ LICENSE exists"

      - name: Check documentation directories
        run: |
          echo "Checking documentation..."
          test -d .sui-docs && echo "✓ .sui-docs exists ($(find .sui-docs -type f | wc -l) files)"
          test -d .walrus-docs && echo "✓ .walrus-docs exists ($(find .walrus-docs -type f | wc -l) files)"
          test -d .seal-docs && echo "✓ .seal-docs exists ($(find .seal-docs -type f | wc -l) files)"
          test -d .ts-sdk-docs && echo "✓ .ts-sdk-docs exists ($(find .ts-sdk-docs -type f | wc -l) files)"
          test -f AGENTS.md && echo "✓ AGENTS.md exists"

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: mcp/move-lsp-mcp/package.json

      - name: Install dependencies
        working-directory: mcp/move-lsp-mcp
        run: pnpm install

      - name: Type check
        working-directory: mcp/move-lsp-mcp
        run: pnpm exec tsc --noEmit
