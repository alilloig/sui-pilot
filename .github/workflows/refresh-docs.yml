name: Refresh upstream docs

on:
  schedule:
    # Mondays 06:00 UTC — weekly cadence is roughly what the team
    # previously did manually per the README ("monthly, or before a major project").
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: refresh-docs
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull upstream docs
        run: ./sync-docs.sh

      - name: Regenerate index inside agent file
        run: ./generate-docs-index.sh

      - name: Skip bundler if nothing drifted
        id: drift
        # sync-sui-pilot-docs.sh always rewrites docs/VERSION.json with a fresh
        # syncTimestamp, so if we ran it unconditionally every week would
        # produce a timestamp-only PR. Gate it on real changes to tracked docs.
        run: |
          if git diff --quiet -- .sui-docs .walrus-docs .seal-docs .ts-sdk-docs agents/sui-pilot-agent.md; then
            echo "drifted=false" >> "$GITHUB_OUTPUT"
            echo "No upstream doc changes this run."
          else
            echo "drifted=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Refresh bundled docs snapshot
        if: steps.drift.outputs.drifted == 'true'
        run: ./scripts/sync-sui-pilot-docs.sh "$GITHUB_WORKSPACE"

      - name: Open or update chore PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/refresh-docs
          delete-branch: true
          commit-message: "chore(docs): refresh upstream docs"
          title: "chore(docs): refresh upstream docs"
          labels: docs
          body: |
            Automated weekly refresh of bundled ecosystem docs.

            Pipeline:
            1. `./sync-docs.sh` — pulls latest from `MystenLabs/sui`, `MystenLabs/walrus`, `MystenLabs/seal`, `MystenLabs/ts-sdks`.
            2. `./generate-docs-index.sh` — rewrites the index block inside `agents/sui-pilot-agent.md`.
            3. `./scripts/sync-sui-pilot-docs.sh` — refreshes the `docs/` bundle and `docs/VERSION.json`.

            Review the diff, especially `.last-sync`, the markered block in the agent file, and any newly added or renamed MDX files under `.*-docs/`.
